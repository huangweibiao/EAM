server:
  port: 8080
  servlet:
    context-path: /eam

spring:
  application:
    name: eam-system

  # Database Configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/eam_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: rootadmin
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 6000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# Logging Configuration
logging:
  level:
    com.eam: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Cache Configuration
cache:
  # 默认缓存过期时间（分钟）
  default-expire: 60
  # 部门缓存过期时间（分钟）
  dept-expire: 60
  # 分类缓存过期时间（分钟）
  category-expire: 120

# Scheduled Job Configuration
scheduled:
  # 维护计划任务配置
  maintenance:
    job:
      hour: 2
      minute: 0
      enabled: true
  # 库存预警任务配置
  stock-warning:
    job:
      interval: 3600
      enabled: true

# Scheduled Job Configuration
